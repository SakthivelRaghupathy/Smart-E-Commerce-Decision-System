<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile page</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background-color: white;
}

.profile-container{
background:white;
width:100%;
max-width:1900px;
margin:auto;
margin-top:1px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
overflow:hidden;
}

/* NAVBAR */
header{
  background:#1c75be57;
  color:rgb(25, 203, 235);
  padding:20px 60px;   
  width:100%;          
  box-sizing:border-box;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
display:flex;
align-items:center;
}

.logo img{
height:60px;
margin-right:30px;
}

.nav-links a{
  color:rgb(26, 107, 230);
  text-decoration:none;
  margin:0 15px;
  font-weight:bold;
  cursor:pointer;
}

.nav-links a:hover{
text-decoration:underline;
}
.nav-links a.active{
  text-decoration: underline;
  color:#000;
}

/* PROFILE */
.main-content{
padding:40px;
margin-left: 50px;
}

.avatar-section{
display:flex;
align-items:center;
gap:25px;
flex-wrap:wrap;
}

.avatar-container{
position:relative;
width:130px;
height:130px;
border-radius:50%;
background:#eee;
overflow:hidden;
border:4px solid #f1f1f1;
}

#avatar-image{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
}

.avatar-edit-btn{
position:absolute;
bottom:15px;
right:5px;
background:#007bff;
color:white;
border:none;
border-radius:50%;
width:36px;
height:36px;
cursor:pointer;
display: flex;
justify-content: center;
align-items: center;
}

.welcome-greeting{
font-size:26px;
font-weight:bold;
}

.welcome-greeting span{
color:#007bff;
}

.welcome-subtitle{
color:#1ecb2b;
font-size:13px;
margin-top:5px;
}

/* USER INFO */
.info-section{
margin-top:30px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.info-label{
font-size:12px;
color:#777;
font-weight: bold;
block-size:15px;
}

.info-value{
font-size:18px;
font-weight: normal;
}

/* SAVED PRODUCTS */
.section-title{
margin-top:30px;
margin-bottom:15px;
}

.saved-item{
display:flex;
align-items:center;
background:white;
border:1px solid #eee;
padding:12px;
border-radius:10px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
transition:0.2s;
}

.saved-item:hover{
transform:scale(1.02);
}

.saved-item img{
width:60px;
height:60px;
border-radius:5px;
margin-right:15px;
}

.saved-item-info{
flex:1;
}

.remove-btn{
background:#ff4d4d;
color:white;
border:none;
padding:6px 12px;
border-radius:5px;
cursor:pointer;
}

.remove-btn:hover{
background:#cc0000;
}

/* LOGOUT */
.logout-section{
display:flex;
flex-direction: column;
align-items: flex-start;
gap:20px;
margin-top:35px;
}

.btn{
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.logout{
  width:160px;
background:#eee;
color:red;
}

.delete{
background:red;
color:white;
margin-right:0;
}
</style>
</head>

<body>

<div class="profile-container">

<header>

<div class="logo">
<img src="websitelogo.jpg.png" alt="Logo">
    <img src="preview.jpg.png" alt="website name">
</div>

<div class="nav-links">
<a href="home.html">🏠 Home</a>
<a href="product-details.html">📄 Product</a>
<a href="analyse.html">📊 Analyze</a>
<a href="suggestion4.html">💡 Suggestion</a>
<a href="profile.html">👤 Profile</a>
</div>

</header>

<div class="main-content">

<div class="avatar-section">

<div class="avatar-container">
<img id="avatar-image" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

<input type="file" id="avatar-upload" style="display:none" accept="image/*">

<button class="avatar-edit-btn" onclick="document.getElementById('avatar-upload').click()">✎</button>
</div>

<div>
<div class="welcome-greeting">
Hello, <span id="welcome-username">Loading...</span>
</div>

<div class="welcome-subtitle">
PRODUCT ANALYTRIX MEMBER
</div>

</div>

</div>

<h2>Personal information</h2>
<div class="info-section">
<div class="info-group">
<div class="info-label">USERNAME</div>
<div class="info-value" id="display-username">Loading...</div>
<br>
<div class="info-label">E-MAIL ADDRESS</div>
<div class="info-value" id="display-email">Loading...</div>
</div>

</div>

<h3 class="section-title">Saved Products</h3>

<p id="totalSaved"></p>

<div id="save-list-content"></div>

<div class="logout-section">

<button class="btn logout" id="logout-btn">LOGOUT</button>
<button class="btn delete" id="delete-btn">DELETE ACCOUNT</button>

</div>

</div>
</div>

<script>

// ================= NAV ACTIVE =================
const links = document.querySelectorAll(".nav-links a");
const current = window.location.pathname.split("/").pop();

links.forEach(link=>{
  if(link.getAttribute("href") === current){
    link.classList.add("active");
  }
});

// ================= DEFAULT AVATAR =================
const defaultAvatar = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

// ================= LOAD PROFILE FROM BACKEND =================
async function loadProfile(){

  try {
    // 1. Immediately load avatar from local storage if the user previously uploaded one
    const savedCustomAvatar = localStorage.getItem("user_custom_avatar");
    if (savedCustomAvatar) {
        document.getElementById("avatar-image").src = savedCustomAvatar;
    } else {
        document.getElementById("avatar-image").src = defaultAvatar;
    }

    const userId = localStorage.getItem("user_id"); // 🔥 GET ID
    
    // Stop and alert if user isn't logged in
    if (!userId) {
        document.getElementById("display-username").textContent = "Please Login";
        return;
    }

    const res = await fetch("http://127.0.0.1:8000/users/profile", {
      headers: {
        "x-user-id": userId   // 🔥 SEND TO BACKEND
      }
    });

    if (!res.ok) throw new Error("Server failed to load profile");

    const data = await res.json();

    // USER INFO
    document.getElementById("display-username").textContent = data.username || "User";
    document.getElementById("welcome-username").textContent = data.username || "User";
    document.getElementById("display-email").textContent = data.email || "No Email";

    // If backend provided an image and user hasn't uploaded a custom one locally
    if (data.profile_image && !savedCustomAvatar) {
        document.getElementById("avatar-image").src = data.profile_image;
    }

    renderSaveList(data.saved_products || []);

  } catch (err) {
    console.error(err);
    document.getElementById("display-username").textContent = "Error loading data";
    document.getElementById("display-email").textContent = "Error loading data";
  }
}

// ================= RENDER SAVED PRODUCTS (SAFE VERSION) =================
function renderSaveList(products){

  const container = document.getElementById("save-list-content");
  container.innerHTML = "";

  document.getElementById("totalSaved").innerText =
    products.length + " products saved";

  if(products.length === 0){
    container.innerHTML = "<p style='color:#777;'>No saved products yet</p>";
    return;
  }

  products.forEach((product, index) => { // Adding index for unique IDs

    const div = document.createElement("div");
    div.className = "saved-item";

    // Define unique ID for the image element in this row
    const imageId = `product-image-${index}`;

    // Notice we pre-populate the src with a loading placeholder
    // We also use a standard onerror for immediate feedback
    div.innerHTML = `
      <img id="${imageId}" src="https://via.placeholder.com/60?text=..." alt="Product image" 
           onerror="this.src='https://via.placeholder.com/60?text=Error'">

      <div class="saved-item-info">
        <h4 style="margin: 0;">${product.product_name || 'Unknown Product'}</h4>
        <p style="margin: 5px 0 0; color: #2563eb; font-weight: bold;">₹ ${product.price || '0'} | ⭐ ${product.rating || 'N/A'}</p>
      </div>

      <button class="remove-btn" onclick="removeProduct('${product.product_id || product.id}')">
        Remove
      </button>
    `;

    container.appendChild(div);

    // NOW, immediately after creating the elements, call our safe image loader helper
    const imageElement = document.getElementById(imageId);
    // We pass the product's image link and the target element to populate
    loadSafeImage(product.product_image, imageElement);
  });
}

// ================= SAFE IMAGE LOADER =================
async function loadSafeImage(imageUrl, targetImageElement) {
  if (!imageUrl || imageUrl === 'none' || imageUrl.includes('placeholder')) {
    targetImageElement.src = 'https://via.placeholder.com/60?text=No+Image'; 
    return;
  }

  try {
    const response = await fetch(imageUrl, {
      referrerPolicy: 'no-referrer' 
    });

    if (!response.ok) {
      throw new Error('Image fetch failed');
    }

    const blob = await response.blob();
    const reader = new FileReader();
    reader.onloadend = function () {
      targetImageElement.src = reader.result;
    }
    reader.readAsDataURL(blob); 

  } catch (error) {
    targetImageElement.src = 'https://via.placeholder.com/60?text=No+Image';
  }
}

// ================= REMOVE PRODUCT =================
async function removeProduct(productId){

  const userId = localStorage.getItem("user_id"); // 🔥 GET USER

  await fetch(`http://127.0.0.1:8000/saved-products/${productId}`, {
    method: "DELETE",
    headers: {
      "x-user-id": userId,  // 🔥 SEND HEADER
      "product_id": productId    // 🔥 SEND HEADER
    }
  });

  loadProfile(); // refresh list
}

// ================= LOGOUT =================
document.getElementById("logout-btn").onclick = async function(){

  await fetch("http://127.0.0.1:8000/logout", {
    method: "POST"
  });

  localStorage.clear();

  window.location.href = "landing.html";
};

// ================= DELETE ACCOUNT =================
document.getElementById("delete-btn").onclick = async function(){

  const userId = localStorage.getItem("user_id");

  if(confirm("Delete account permanently?")){

    await fetch("http://127.0.0.1:8000/users/delete", {
      method: "DELETE",
      headers: {
        "x-user-id": userId   // 🔥 REQUIRED
      }
    });

    localStorage.clear();
    alert("Account deleted");

    window.location.href = "landing.html";
  }
};

// ================= AVATAR (SAVE & LOAD) =================
document.getElementById("avatar-upload").addEventListener("change",function(e){

  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(event){
    const base64Image = event.target.result;
    
    // Update image on screen instantly
    document.getElementById("avatar-image").src = base64Image;
    
    // Save to local storage so it survives page reloads
    localStorage.setItem("user_custom_avatar", base64Image);
  };

  reader.readAsDataURL(file);
});

// ================= LOAD ON STARTUP =================
window.onload = loadProfile;

</script>

</body>
</html>

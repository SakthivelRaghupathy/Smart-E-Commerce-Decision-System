<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verify OTP</title>

<style>
* { box-sizing: border-box; font-family: Arial, sans-serif; }

body {
    margin: 0;
    height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
    background: url("logo.jpeg") center/cover no-repeat;
    overflow: hidden;
}

.card {
    background: #ebe6df; /* Match the slightly off-white color from your screenshot */
    padding: 40px;
    border-radius: 10px;
    width: 420px;
    text-align: center;
    box-shadow: 0 5px 20px rgba(0,0,0,.3);
}

h2 {
    margin-top: 0;
    margin-bottom: 25px;
    font-size: 22px;
}

.lock-icon {
    width: 80px;
    height: 80px;
    margin-bottom: 15px;
    object-fit: contain;
}

.info-text {
    margin: 8px 0;
    font-size: 15px;
    color: #333;
}

.otp {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 20px 0;
}

.otp input {
    width: 40px;
    height: 45px;
    text-align: center;
    font-size: 20px;
    border: none;
    border-radius: 6px;
    background: white;
}

.timer-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 20px;
    padding: 0 10px;
}
.timer{
  color:#e74c3c;
  margin:10px 0;
  margin-left: 0;
}
.resend{
  margin-left:40px;
  color:#3498db;
  cursor:pointer;
  pointer-events:none;
  opacity:0.5;
}
/*.timer { color: #e74c3c; }
.resend { color: #888; text-decoration: none; }*/

button {
    width: 100%;
    padding: 12px;
    background: #4F46E5;
    border: none;
    color: white;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

.skip {
    margin-top: 20px;
    font-size: 14px;
    color: #333;
}

.skip a {
    color: #3498db;
    text-decoration: none;
    font-weight: bold;
}

#notification-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
}

.note {
    padding: 12px 20px;
    border-radius: 6px;
    color: white;
    margin-bottom: 10px;
    font-weight: bold;
    animation: slide .3s ease;
}

.success { background: #27ae60; }
.error { background: #e74c3c; }

@keyframes slide {
    from { opacity: 0; transform: translateX(80px); }
    to { opacity: 1; transform: translateX(0); }
}
</style>
</head>

<body>

<div id="notification-container"></div>

<div class="card">
    <h2>Enter verification code</h2>
    
    <img src="verify.jpeg" alt="Lock Icon" class="lock-icon">
    
    <p class="info-text">Welcome back to our site!</p>
    <p class="info-text">Enter OTP</p>
    <p class="info-text">we have sent to your email</p>

    <div class="otp">
        <input maxlength="1"><input maxlength="1"><input maxlength="1">
        <input maxlength="1"><input maxlength="1"><input maxlength="1">
    </div>
<div class="timer">
  OTP Expires in <span id="time">120</span> seconds   
  <span class="resend" id="resendBtn" onclick="resendOTP()">Resend OTP</span>
</div>

    <button id="verify">Verify and Continue</button>
    
    <div class="skip">
        Skip and continue to <a href="landing.html">Home</a>
    </div>
</div>

<script>
function showNotification(msg, type) {
    let container = document.getElementById("notification-container");
    if (!container) {
        container = document.createElement("div");
        container.id = "notification-container";
        document.body.appendChild(container);
    }
    const box = document.createElement("div");
    box.className = "note " + type;
    box.innerText = msg;
    container.appendChild(box);
    setTimeout(() => box.remove(), 3000);
}

const inputs = document.querySelectorAll(".otp input");

inputs.forEach((input, i) => {
    input.addEventListener("input", () => {
        if (input.value && i < 5) inputs[i + 1].focus();
    });
    input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && i > 0) {
            inputs[i - 1].focus();
        }
    });
});
let time = 120;
const timerEl = document.getElementById("time");
const resendBtn = document.getElementById("resendBtn");

resendBtn.style.pointerEvents = "none";
resendBtn.style.opacity = "0.5";

const countdown = setInterval(() => {

    time--;
    timerEl.textContent = time;

    if(time <= 0){
        clearInterval(countdown);
        resendBtn.style.pointerEvents = "auto";
        resendBtn.style.opacity = "1";
    }

},1000);

document.getElementById("verify").onclick = async () => {
    const url = new URLSearchParams(location.search);
    const username = url.get("username");
    const email = url.get("email");

    let otp = "";
    inputs.forEach(i => otp += i.value);

    if (otp.length !== 6) {
        showNotification("Enter complete OTP", "error");
        return;
    }

    try {
        const res = await fetch("http://127.0.0.1:8000/auth/verify-otp", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, email, otp })
        });

        const data = await res.json();

        if (res.ok) {

    // ✅ STORE USER ID (MOST IMPORTANT)
    localStorage.setItem("user_id", data.user_id);

    // (optional but useful)
    localStorage.setItem("username", username);
    localStorage.setItem("email", email);

    showNotification(data.message || "Login successful!", "success");

    setTimeout(() => {
        location.href = "home.html";
    }, 1500);
}
         else {
            showNotification(data.message || "Invalid OTP", "error");
            inputs.forEach(i => i.value = "");
            inputs[0].focus();
            resendBtn.style.pointerEvents="auto";
            resendBtn.style.opacity="1";
        }
    } catch {
        showNotification("Server error", "error");
    }
}
async function resendOTP(){

    const url = new URLSearchParams(location.search);
    const username = url.get("username");
    const email = url.get("email");

    try{
        await fetch("http://127.0.0.1:8000/auth/generate-otp",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({username,email})
        });

        showNotification("OTP Resent Successfully","success");

        // reset timer
        time = 120;
        timerEl.textContent = time;
        resendBtn.style.pointerEvents="none";
        resendBtn.style.opacity="0.5";

    }catch{
        showNotification("Server error","error");
    }
}
</script>

</body>
</html>

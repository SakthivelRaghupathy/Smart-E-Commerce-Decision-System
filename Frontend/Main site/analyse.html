<script>

let products = [];

// =============================
// 🔥 FETCH ANALYSIS DATA (CORRECTED)
// =============================
async function loadAnalysis() {
  try {
    // 1. Get the User ID
    const userId = localStorage.getItem("user_id");
    if (!userId) {
      alert("Please log in first.");
      window.location.href = "login.html";
      return;
    }

    // 2. Get the choices saved from product-details.html
    const savedChoices = localStorage.getItem("choices");
    if (!savedChoices || JSON.parse(savedChoices).length === 0) {
      alert("No products selected! Redirecting to products page...");
      window.location.href = "product-details.html";
      return;
    }

    // Extract just the IDs to send to the backend
    const choicesArray = JSON.parse(savedChoices);
    const productIdsArray = choicesArray.map(p => p.id);

    // 3. POST to /analyze to tell the server what to process
    const analyzeRes = await fetch("http://127.0.0.1:8000/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-user-id": userId // Fixed header
      },
      body: JSON.stringify({
        product_ids: productIdsArray
      })
    });

    if (!analyzeRes.ok) throw new Error("Failed to process analysis on server.");

    // 4. GET the actual results to draw the UI
    const resultRes = await fetch("http://127.0.0.1:8000/analyze-result", {
      method: "GET",
      headers: {
        "x-user-id": userId // Fixed header
      }
    });

    if (!resultRes.ok) throw new Error("Failed to fetch results.");

    const data = await resultRes.json();
    
    // Check your console to see exactly what the API returns!
    console.log("Analysis Results:", data); 

    // Adjust this if your backend returns the array directly vs inside a "products" object
    products = data.products || data || []; 

    if(products.length === 0) {
        document.querySelector(".container").innerHTML = "<h2 style='text-align:center;'>No analysis data generated.</h2>";
        return;
    }

    renderAll();

  } catch (err) {
    console.error(err);
    alert("Failed to load analysis. Check console for details.");
  }
}

// =============================
// ✅ MAIN RENDER
// =============================
function renderAll() {
  renderProductList();
  renderTable();
  renderPriceChart();
  renderRatingCharts();
}

// =============================
// ✅ PRODUCT LIST (BOTTOM)
// =============================
function renderProductList() {
  const productList = document.getElementById("productList");
  productList.innerHTML = "";

  products.forEach(p => {
    productList.innerHTML += `
      <div class="product-row">
        <div class="center">
          <h3>${p.product_name || 'Unknown Product'}</h3>
          <p>Deal Score: ${p.deal_score || 'N/A'}</p>
        </div>
        <div class="right">
          <button class="buy-btn" onclick="goBuy('${p.token || p.product_id || p.id}')">
            Find Best Place to Buy →
          </button>
        </div>
      </div>
    `;
  });
}

// =============================
// ✅ COMPARISON TABLE
// =============================
function renderTable() {
  const tbody = document.querySelector("#featureTable tbody");
  tbody.innerHTML = "";

  products.forEach(p => {
    tbody.innerHTML += `
      <tr>
        <td><b>${p.product_name || '-'}</b></td>
        <td>${p.brand || '-'}</td>
        <td>₹ ${p.price || 0}</td>
        <td>⭐ ${p.rating || 0}</td>
        <td>${p.review_count || 0}</td>
        <td>${p.shipping || p.delivery_charge || 'Free'}</td>
        <td style="font-weight:bold; color:#15803d;">${p.deal_score || '-'}</td>
      </tr>
    `;
  });
}

// =============================
// ✅ PRICE CHART
// =============================
function renderPriceChart() {
  new Chart(document.getElementById("priceChart"), {
    type: "bar",
    data: {
      labels: products.map(p => p.product_name),
      datasets: [{
        label: "Price (₹)",
        data: products.map(p => p.price),
        backgroundColor: "#93c5fd", // Light blue matching your mockup
        borderRadius: 4
      }]
    },
    options: {
      scales: {
        y: { beginAtZero: true }
      }
    }
  });
}

// =============================
// ✅ RATING DONUT CHART
// =============================
function renderRatingCharts() {
  const container = document.getElementById("ratingCharts");
  container.innerHTML = "";

  const colors = ["#22c55e", "#3b82f6", "#f59e0b"];

  products.forEach((p, index) => {
    const box = document.createElement("div");
    box.style.textAlign = "center";

    const canvas = document.createElement("canvas");
    canvas.width = 260;
    canvas.height = 260;

    const label = document.createElement("p");
    label.innerText = p.product_name;
    label.style.fontWeight = "bold";

    box.appendChild(canvas);
    box.appendChild(label);
    container.appendChild(box);

    const centerTextPlugin = {
      id: 'centerText',
      beforeDraw: function(chart) {
        const width = chart.width;
        const height = chart.height;
        const ctx = chart.ctx;

        ctx.restore();
        ctx.font = "bold 32px Arial"; 
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#000000"; 

        const text = (p.rating || 0).toString(); 
        const textX = Math.round((width - ctx.measureText(text).width) / 2);
        const textY = height / 2;

        ctx.fillText(text, textX, textY);
        ctx.save();
      }
    };

    new Chart(canvas, {
      type: "doughnut",
      data: {
        datasets: [{
          data: [p.rating || 0, 5 - (p.rating || 0)],
          backgroundColor: [colors[index % colors.length], "#e5e7eb"],
          borderWidth: 0
        }]
      },
      options: {
        cutout: "75%",
        plugins: { 
          legend: { display: false },
          tooltip: { enabled: false }
        }
      },
      plugins: [centerTextPlugin]
    });
  });
}

// =============================
// 🔁 NAVIGATION
// =============================
function goBuy(token){
  // If your backend uses product_id instead of token, this will pass it properly!
  window.location.href = "suggestion4.html?token=" + token;
}

// =============================
window.onload = loadAnalysis;

// NAV ACTIVE
const links = document.querySelectorAll(".nav-links a");
const current = window.location.pathname.split("/").pop();

links.forEach(link=>{
  if(link.getAttribute("href") === current){
    link.classList.add("active");
  }
});

</script>
